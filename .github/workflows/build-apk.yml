name: Build Flutter APK

on:
  push:
    branches: [main]
    paths:
      - "flutter_app/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: flutter_app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Generate Android project files
        run: flutter create . --platforms=android --project-name somnus_sync

      - name: Configure Android Health Connect permissions
        run: |
          python - <<'PY'
          from pathlib import Path

          manifest = Path("android/app/src/main/AndroidManifest.xml")
          text = manifest.read_text(encoding="utf-8")

          if "android.permission.INTERNET" not in text:
              text = text.replace(
                  "<manifest",
                  '<manifest',
                  1,
              )
              text = text.replace(
                  "<application",
                  '    <uses-permission android:name="android.permission.INTERNET" />\n'
                  '    <uses-permission android:name="android.permission.health.READ_SLEEP" />\n\n'
                  '    <queries>\n'
                  '        <package android:name="com.google.android.apps.healthdata" />\n'
                  '    </queries>\n\n'
                  "    <application",
                  1,
              )

          if "health_permissions" not in text:
              text = text.replace(
                  '<activity android:name=".MainActivity"',
                  '<activity android:name=".MainActivity"',
                  1,
              )
              activity_close = text.find(">", text.find('<activity android:name=".MainActivity"'))
              text = (
                  text[: activity_close + 1]
                  + '\n            <meta-data android:name="health_permissions" android:resource="@array/health_permissions" />'
                  + '\n            <intent-filter>'
                  + '\n                <action android:name="androidx.health.ACTION_SHOW_PERMISSIONS_RATIONALE" />'
                  + '\n            </intent-filter>'
                  + text[activity_close + 1 :]
              )

          manifest.write_text(text, encoding="utf-8")

          values = Path("android/app/src/main/res/values")
          values.mkdir(parents=True, exist_ok=True)
          (values / "health_permissions.xml").write_text(
              """<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <array name="health_permissions">
                  <item>android.permission.health.READ_SLEEP</item>
              </array>
          </resources>
          """,
              encoding="utf-8",
          )

          for gradle in (Path("android/app/build.gradle.kts"), Path("android/app/build.gradle")):
              if not gradle.exists():
                  continue
              gradle_text = gradle.read_text(encoding="utf-8")
              gradle_text = gradle_text.replace("minSdk = flutter.minSdkVersion", "minSdk = 26")
              gradle_text = gradle_text.replace("minSdkVersion flutter.minSdkVersion", "minSdkVersion 26")
              gradle.write_text(gradle_text, encoding="utf-8")
          PY

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze Dart code
        run: flutter analyze

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: somnus-sync-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
