name: Build Flutter APK

on:
  push:
    branches: [main]
    paths:
      - "flutter_app/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: flutter_app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Generate Android project files
        run: |
          flutter create . --platforms=android --project-name somnus_sync
          rm -rf test

      - name: Configure Android Health Connect permissions
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import xml.etree.ElementTree as ET

          manifest = Path("android/app/src/main/AndroidManifest.xml")
          text = manifest.read_text(encoding="utf-8")

          manifest_entries = []

          for permission in (
              "android.permission.INTERNET",
              "android.permission.health.READ_SLEEP",
              "android.permission.health.READ_HEALTH_DATA_IN_BACKGROUND",
          ):
              if permission not in text:
                  manifest_entries.append(
                      f'    <uses-permission android:name="{permission}" />'
                  )

          if "com.google.android.apps.healthdata" not in text:
              manifest_entries.extend(
                  [
                      "    <queries>",
                      '        <package android:name="com.google.android.apps.healthdata" />',
                      "    </queries>",
                  ]
              )

          if manifest_entries:
              application_match = re.search(r"(?m)^\s*<application\b", text)
              if application_match is None:
                  raise RuntimeError("<application> not found in AndroidManifest.xml")

              text = (
                  text[: application_match.start()]
                  + "\n".join(manifest_entries)
                  + "\n\n"
                  + text[application_match.start() :]
              )

          activity_match = re.search(
              r'''<activity\b(?=[^>]*android:name=["']\.MainActivity["'])[^>]*>''',
              text,
          )
          if activity_match is None:
              raise RuntimeError("MainActivity not found in AndroidManifest.xml")

          activity_entries = []

          if 'android:name="health_permissions"' not in text:
              activity_entries.append(
                  '            <meta-data android:name="health_permissions" '
                  'android:resource="@array/health_permissions" />'
              )

          if "androidx.health.ACTION_SHOW_PERMISSIONS_RATIONALE" not in text:
              activity_entries.extend(
                  [
                      "            <intent-filter>",
                      '                <action android:name="androidx.health.ACTION_SHOW_PERMISSIONS_RATIONALE" />',
                      "            </intent-filter>",
                  ]
              )

          if activity_entries:
              text = (
                  text[: activity_match.end()]
                  + "\n"
                  + "\n".join(activity_entries)
                  + text[activity_match.end() :]
              )

          manifest.write_text(text, encoding="utf-8")
          ET.parse(manifest)

          values = Path("android/app/src/main/res/values")
          values.mkdir(parents=True, exist_ok=True)

          strings = values / "strings.xml"
          strings.write_text(
              '''<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Somnus</string>
          </resources>
          ''',
              encoding="utf-8",
          )
          ET.parse(strings)

          text = text.replace('android:label="somnus_sync"', 'android:label="@string/app_name"')
          text = text.replace('android:label="Somnus Sync"', 'android:label="@string/app_name"')
          manifest.write_text(text, encoding="utf-8")
          ET.parse(manifest)

          health_permissions = values / "health_permissions.xml"
          health_permissions.write_text(
              '''<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <array name="health_permissions">
                  <item>androidx.health.permission.SleepSession.READ</item>
              </array>
          </resources>
          ''',
              encoding="utf-8",
          )
          ET.parse(health_permissions)

          for gradle in (
              Path("android/app/build.gradle.kts"),
              Path("android/app/build.gradle"),
          ):
              if not gradle.exists():
                  continue

              gradle_text = gradle.read_text(encoding="utf-8")
              gradle_text = gradle_text.replace(
                  "minSdk = flutter.minSdkVersion",
                  "minSdk = 26",
              )
              gradle_text = gradle_text.replace(
                  "minSdkVersion flutter.minSdkVersion",
                  "minSdkVersion 26",
              )
              gradle.write_text(gradle_text, encoding="utf-8")

          print("AndroidManifest.xml is valid")
          print(manifest.read_text(encoding="utf-8"))
          PY

      - name: Configure release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import os
          import re

          required = [
              "ANDROID_KEYSTORE_BASE64",
              "ANDROID_KEYSTORE_PASSWORD",
              "ANDROID_KEY_ALIAS",
              "ANDROID_KEY_PASSWORD",
          ]
          missing = [name for name in required if not os.environ.get(name)]
          if missing:
              print("Release signing secrets are not configured.")
              print("APK will be built with the default temporary signing key and may require reinstall.")
              raise SystemExit(0)

          keystore = Path("android/app/somnus-release.jks")
          keystore.write_bytes(base64.b64decode(os.environ["ANDROID_KEYSTORE_BASE64"]))

          props = Path("android/key.properties")
          props.write_text(
              "\n".join(
                  [
                      f"storePassword={os.environ['ANDROID_KEYSTORE_PASSWORD']}",
                      f"keyPassword={os.environ['ANDROID_KEY_PASSWORD']}",
                      f"keyAlias={os.environ['ANDROID_KEY_ALIAS']}",
                      "storeFile=somnus-release.jks",
                      "",
                  ]
              ),
              encoding="utf-8",
          )

          kts = Path("android/app/build.gradle.kts")
          groovy = Path("android/app/build.gradle")

          if kts.exists():
              text = kts.read_text(encoding="utf-8")
              if "keystoreProperties" not in text:
                  text = (
                      "import java.util.Properties\n"
                      "import java.io.FileInputStream\n\n"
                      "val keystoreProperties = Properties()\n"
                      "val keystorePropertiesFile = rootProject.file(\"key.properties\")\n"
                      "if (keystorePropertiesFile.exists()) {\n"
                      "    keystoreProperties.load(FileInputStream(keystorePropertiesFile))\n"
                      "}\n\n"
                      + text
                  )

              release_signing_config = (
                  "    signingConfigs {\n"
                  "        create(\"release\") {\n"
                  "            keyAlias = keystoreProperties[\"keyAlias\"] as String\n"
                  "            keyPassword = keystoreProperties[\"keyPassword\"] as String\n"
                  "            storeFile = file(keystoreProperties[\"storeFile\"] as String)\n"
                  "            storePassword = keystoreProperties[\"storePassword\"] as String\n"
                  "        }\n"
                  "    }\n\n"
              )

              if "create(\"release\")" not in text:
                  build_types_marker = "    buildTypes {"
                  if build_types_marker not in text:
                      raise RuntimeError("buildTypes block not found in build.gradle.kts")
                  text = text.replace(
                      build_types_marker,
                      release_signing_config + build_types_marker,
                      1,
                  )

              text = re.sub(
                  r"signingConfig\s*=\s*signingConfigs\.getByName\(\"debug\"\)",
                  "signingConfig = signingConfigs.getByName(\"release\")",
                  text,
              )
              kts.write_text(text, encoding="utf-8")
              print(kts.read_text(encoding="utf-8"))

          elif groovy.exists():
              text = groovy.read_text(encoding="utf-8")
              if "keystoreProperties" not in text:
                  text = (
                      "def keystoreProperties = new Properties()\n"
                      "def keystorePropertiesFile = rootProject.file('key.properties')\n"
                      "if (keystorePropertiesFile.exists()) {\n"
                      "    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))\n"
                      "}\n\n"
                      + text
                  )

              release_signing_config = (
                  "    signingConfigs {\n"
                  "        release {\n"
                  "            keyAlias keystoreProperties['keyAlias']\n"
                  "            keyPassword keystoreProperties['keyPassword']\n"
                  "            storeFile file(keystoreProperties['storeFile'])\n"
                  "            storePassword keystoreProperties['storePassword']\n"
                  "        }\n"
                  "    }\n\n"
              )

              if "signingConfigs.release" not in text:
                  build_types_marker = "    buildTypes {"
                  if build_types_marker not in text:
                      raise RuntimeError("buildTypes block not found in build.gradle")
                  text = text.replace(
                      build_types_marker,
                      release_signing_config + build_types_marker,
                      1,
                  )

              text = text.replace("signingConfig signingConfigs.debug", "signingConfig signingConfigs.release")
              groovy.write_text(text, encoding="utf-8")
              print(groovy.read_text(encoding="utf-8"))
          else:
              raise RuntimeError("Android app Gradle file not found")
          PY

      - name: Install dependencies
        run: flutter pub get

      - name: Patch flutter_health_connect for modern Android Gradle Plugin
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import xml.etree.ElementTree as ET

          plugin_dirs = list(
              (Path.home() / ".pub-cache" / "hosted").glob(
                  "*/flutter_health_connect-*/android"
              )
          )

          if not plugin_dirs:
              raise RuntimeError("flutter_health_connect was not found in pub cache")

          for plugin_dir in plugin_dirs:
              gradle = plugin_dir / "build.gradle"
              manifest = plugin_dir / "src/main/AndroidManifest.xml"

              if not gradle.exists():
                  raise RuntimeError(f"Missing plugin build.gradle: {gradle}")

              gradle_text = gradle.read_text(encoding="utf-8")

              if not re.search(r"(?m)^\s*namespace\s+", gradle_text):
                  gradle_text = gradle_text.replace(
                      "android {",
                      'android {\n    namespace "dev.duynp.flutter_health_connect"',
                      1,
                  )

              gradle_text = re.sub(
                  r"compileSdkVersion\s+\d+",
                  "compileSdkVersion 34",
                  gradle_text,
              )
              gradle_text = re.sub(
                  r"compileSdk\s*=\s*\d+",
                  "compileSdk = 34",
                  gradle_text,
              )
              gradle.write_text(gradle_text, encoding="utf-8")

              if manifest.exists():
                  manifest_text = manifest.read_text(encoding="utf-8")
                  manifest_text = re.sub(
                      r'\s+package=["\'][^"\']+["\']',
                      "",
                      manifest_text,
                      count=1,
                  )
                  manifest.write_text(manifest_text, encoding="utf-8")
                  ET.parse(manifest)

              print(f"Patched: {plugin_dir}")
              print(gradle.read_text(encoding="utf-8"))
          PY

      - name: Prevent WorkManager release crash
        run: |
          python - <<'PY'
          from pathlib import Path

          rules = Path("android/app/proguard-rules.pro")
          rules.write_text(
              '''# WorkManager/Room classes are created through reflection.
          -keep class androidx.work.impl.WorkDatabase_Impl { *; }
          -keep class * extends androidx.room.RoomDatabase { *; }
          -keep class androidx.startup.** { *; }
          ''',
              encoding="utf-8",
          )

          kts = Path("android/app/build.gradle.kts")
          groovy = Path("android/app/build.gradle")

          if kts.exists():
              gradle = kts.read_text(encoding="utf-8")
              release_marker = "        release {\n"

              if release_marker not in gradle:
                  raise RuntimeError("Release build type not found in build.gradle.kts")

              gradle = gradle.replace(
                  release_marker,
                  release_marker
                  + "            isMinifyEnabled = false\n"
                  + "            isShrinkResources = false\n",
                  1,
              )
              kts.write_text(gradle, encoding="utf-8")
              print(kts.read_text(encoding="utf-8"))

          elif groovy.exists():
              gradle = groovy.read_text(encoding="utf-8")
              release_marker = "        release {\n"

              if release_marker not in gradle:
                  raise RuntimeError("Release build type not found in build.gradle")

              gradle = gradle.replace(
                  release_marker,
                  release_marker
                  + "            minifyEnabled false\n"
                  + "            shrinkResources false\n",
                  1,
              )
              groovy.write_text(gradle, encoding="utf-8")
              print(groovy.read_text(encoding="utf-8"))

          else:
              raise RuntimeError("Android app Gradle file not found")
          PY

      - name: Analyze Dart code
        run: flutter analyze

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: somnus-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
